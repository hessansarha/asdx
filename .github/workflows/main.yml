name: Create-Hatch-Chromebook-Final

on:
  workflow_dispatch:

jobs:
  build-chromebook:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Server Preparation
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f

      - name: 2. Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: 3. Deploy Virtual Chromebook (Hatch)
        run: |
          # تشغيل محاكي Chromebook كامل المواصفات
          docker run -d --name chromebook --device /dev/kvm -p 3389:3389 \
          -e RAM=$(($(free -g | awk '/^Mem:/{print $2}') - 1)) \
          -e CORES=$(nproc) \
          -e EXTRA="-vga virtio -display none -usb -device usb-tablet" \
          sickcodes/docker-chromeos:latest

      - name: 4. Get Connection Details
        run: |
          echo "===================================================="
          echo "✅ تم إنشاء جهاز Chromebook الخاص بك بنجاح!"
          echo "🔗 اتصل الآن عبر RDP باستخدام هذا العنوان:"
          tailscale ip -4
          echo "===================================================="

      - name: 5. Keep Device Online
        run: while true; do sleep 300; done
