name: Final-Hatch-Build-From-Video

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clean Server
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f

      - name: 2. Install Build Tools
        run: sudo apt update && sudo apt install -y unzip tar pv qemu-kvm qemu-utils

      - name: 3. Download Your Full Package
        run: |
          # تحميل الملف المدمج الذي يحتوي على كل شيء (من رابطك)
          curl -L "https://drive.usercontent.google.com/download?id=19eWMfDpelImZVh-W8H9gn_F7kqLJwexG&export=download" -o package.zip
          ls -lh package.zip

      - name: 4. Extract and Locate Files (Smart Search)
        run: |
          unzip -o package.zip
          
          # البحث عن ملف Brunch (r145) واستخراجه أينما كان
          BRUNCH_FILE=$(find . -name "brunch_*.tar.gz" | head -n 1)
          tar -xvf "$BRUNCH_FILE"
          
          # البحث عن ملف الـ Recovery (.bin) الخاص بـ Hatch
          # سنبحث داخل المجلدات التي ظهرت في الفيديو
          RECOVERY_FILE=$(find . -name "*hatch*.bin" | head -n 1)
          echo "Found Recovery: $RECOVERY_FILE"
          
          # بناء النظام
          sudo bash chromeos-install.sh -src "$RECOVERY_FILE" -dst chromeos.img

      - name: 5. Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: 6. Launch Your Chromebook
        run: |
          TOTAL_RAM=$(free -g | awk '/^Mem:/{print $2}')
          ALLOCATED_RAM=$((TOTAL_RAM - 1))
          
          docker run -d --name chromebook --device /dev/kvm -p 3389:3389 \
          -v $(pwd)/chromeos.img:/image/chromeos.img \
          -e RAM=${ALLOCATED_RAM} \
          -e CORES=$(nproc) \
          -e EXTRA="-vga virtio -display none -usb -device usb-tablet" \
          sickcodes/docker-chromeos:latest

      - name: 7. Get IP
        run: |
          echo "===================================================="
          tailscale ip -4
          echo "===================================================="

      - name: 8. Keep Alive
        run: while true; do sleep 300; done
